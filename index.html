<!DOCTYPE html>
<!-- ============================================================
     МИНИМАЛЬНЫЙ ПУЛЬТ — джойстик + MQTT, без дизайна.
     Шлёт {seq,t,s,p} в catamaran/9f3a/command раз в INTERVAL мс.
     Тот же брокер HiveMQ Cloud, WebSocket TLS (порт 8884, путь /mqtt).
     Логирует в консоль И на экран каждую отправку.
     ============================================================ -->
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>min helm</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
<style>
  body{font-family:monospace;margin:0;padding:10px;background:#111;color:#ddd}
  #pad{width:90vw;max-width:320px;height:90vw;max-height:320px;margin:10px auto;
       border:1px solid #444;border-radius:10px;background:#1a1a1a;position:relative;
       touch-action:none}
  #knob{width:50px;height:50px;border-radius:50%;background:#3a8;position:absolute;
        left:50%;top:50%;transform:translate(-50%,-50%)}
  .row{margin:6px 0}
  input{font-family:monospace;font-size:16px;width:100%;padding:6px;
        background:#222;color:#ddd;border:1px solid #444;border-radius:6px}
  button{font-family:monospace;font-size:16px;padding:10px;width:100%;
          background:#2a6;color:#000;border:0;border-radius:6px;margin-top:6px}
  #status{padding:6px;border-radius:6px;text-align:center;margin:6px 0}
  #log{font-size:11px;white-space:pre-wrap;background:#000;padding:8px;
       border-radius:6px;height:160px;overflow:auto;margin-top:8px}
  .ts{color:#888}
</style>
</head>
<body>

<div class="row"><input id="host" value="b35b2642727348a5857d5427bc0c763c.s1.eu.hivemq.cloud"></div>
<div class="row"><input id="port" value="8884"></div>
<div class="row"><input id="path" value="/mqtt"></div>
<div class="row"><input id="user" value="Joystick"></div>
<div class="row"><input id="pass" type="password" placeholder="пароль Joystick"></div>
<button id="connect">Подключиться</button>

<div id="status" style="background:#622">OFFLINE</div>

<div id="pad"><div id="knob"></div></div>
<div class="row">T: <span id="t">0</span>　S: <span id="s">0</span>　отправлено: <span id="tx">0</span></div>

<div id="log"></div>

<script>
/* ====== Параметры ====== */
const TOPIC = 'catamaran/9f3a/command';
const INTERVAL = 500;          // мс между отправками. Поменяй на 2000 для теста.

/* ====== Состояние ====== */
let client=null, connected=false;
let thr=0, steer=0, seq=0, txCount=0;

const $=id=>document.getElementById(id);
function logline(s){
  const d=$('log');
  const t=new Date().toLocaleTimeString();
  d.textContent += `[${t}] ${s}\n`;
  d.scrollTop=d.scrollHeight;
  console.log(s);
}
function setStatus(txt,color){ $('status').textContent=txt; $('status').style.background=color; }

/* ====== Подключение ====== */
$('connect').onclick=()=>{
  const host=$('host').value.trim();
  const port=parseInt($('port').value)||8884;
  const path=$('path').value.trim()||'/mqtt';
  const cid='minhelm-'+Math.random().toString(16).slice(2,10);
  client=new Paho.MQTT.Client(host, port, path, cid);

  client.onConnectionLost=(r)=>{
    connected=false; setStatus('CONNECTION LOST: '+r.errorMessage,'#622');
    logline('onConnectionLost: '+r.errorMessage);
  };

  const opts={
    useSSL:true, timeout:6, keepAliveInterval:30, cleanSession:true,
    onSuccess:()=>{
      connected=true; setStatus('ONLINE','#262');
      logline('CONNECTED как '+cid);
    },
    onFailure:(e)=>{
      connected=false; setStatus('FAIL: '+e.errorMessage,'#622');
      logline('onFailure: '+e.errorMessage);
    }
  };
  const u=$('user').value.trim(), p=$('pass').value;
  if(u) opts.userName=u;
  if(p) opts.password=p;
  logline('Подключение к '+host+':'+port+path);
  client.connect(opts);
};

/* ====== Отправка раз в INTERVAL ====== */
setInterval(()=>{
  if(!connected || !client) return;
  seq++;
  const payload=JSON.stringify({seq, t:Math.round(thr), s:Math.round(steer), p:0});
  const m=new Paho.MQTT.Message(payload);
  m.destinationName=TOPIC;
  m.qos=0;
  try{
    client.send(m);
    txCount++; $('tx').textContent=txCount;
    logline('TX seq='+seq+' t='+Math.round(thr)+' s='+Math.round(steer));
  }catch(e){
    logline('TX FAIL: '+e.message);
  }
}, INTERVAL);

/* ====== Джойстик ====== */
const pad=$('pad'), knob=$('knob');
let dragging=false;
function setFromEvent(e){
  const r=pad.getBoundingClientRect();
  const pt=(e.touches&&e.touches[0])||(e.changedTouches&&e.changedTouches[0])||e;
  let dx=(pt.clientX-r.left)/r.width*2-1;
  let dy=(pt.clientY-r.top)/r.height*2-1;
  const mag=Math.hypot(dx,dy);
  if(mag>1){dx/=mag;dy/=mag;}
  steer=dx*100; thr=-dy*100;
  if(Math.abs(steer)<8)steer=0;
  if(Math.abs(thr)<8)thr=0;
  $('t').textContent=Math.round(thr);
  $('s').textContent=Math.round(steer);
  knob.style.left=(50+dx*45)+'%';
  knob.style.top=(50+dy*45)+'%';
}
function reset(){
  thr=0;steer=0;
  $('t').textContent='0';$('s').textContent='0';
  knob.style.left='50%';knob.style.top='50%';
}
pad.addEventListener('touchstart',e=>{dragging=true;setFromEvent(e);e.preventDefault();},{passive:false});
pad.addEventListener('touchmove',e=>{if(dragging){setFromEvent(e);e.preventDefault();}},{passive:false});
pad.addEventListener('touchend',e=>{dragging=false;reset();e.preventDefault();},{passive:false});
pad.addEventListener('mousedown',e=>{dragging=true;setFromEvent(e);});
pad.addEventListener('mousemove',e=>{if(dragging)setFromEvent(e);});
window.addEventListener('mouseup',()=>{if(dragging){dragging=false;reset();}});

logline('Готов. Введи пароль Joystick и нажми Подключиться. INTERVAL='+INTERVAL+'мс');
</script>
</body>
</html>
